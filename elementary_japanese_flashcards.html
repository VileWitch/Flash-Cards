<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+JP:wght@400;500&display=swap');

html, body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f6f1e4;
}
.ej-root {
  --moss: #2f5233;
  --moss-deep: #1c3320;
  --washi: #f6f1e4;
  --washi-line: #e3d9c0;
  --sakura: #c0577a;
  --gold: #c79a3d;
  --ink: #2a2620;
  --ink-soft: #6b6455;
  font-family: 'Noto Sans JP', 'Zen Maru Gothic', sans-serif;
  color: var(--ink);
  background: var(--washi);
  background-image:
    radial-gradient(circle at 20% 10%, rgba(47,82,51,0.06), transparent 40%),
    radial-gradient(circle at 90% 85%, rgba(192,87,122,0.06), transparent 45%);
  border-radius: 18px;
  padding: 28px;
  width: 100%;
  max-width: 760px;
  margin: 24px auto;
  box-sizing: border-box;
  font-size: 1.12em;
}
.ej-root * { box-sizing: border-box; }

.ej-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
  border-bottom: 2px solid var(--washi-line);
  padding-bottom: 10px;
}
.ej-title {
  font-family: 'Shippori Mincho', serif;
  font-weight: 700;
  font-size: 22px;
  color: var(--moss-deep);
  letter-spacing: 0.02em;
}
.ej-title .jp { color: var(--sakura); margin-right: 8px; }
.ej-sub { font-size: 12px; color: var(--ink-soft); }

.ej-filters {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.ej-chip {
  border: 1.5px solid var(--moss);
  color: var(--moss);
  background: transparent;
  border-radius: 999px;
  padding: 4px 11px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s ease;
  font-family: inherit;
}
.ej-chip.active {
  background: var(--moss);
  color: var(--washi);
}
.ej-chip:hover { transform: translateY(-1px); }

.ej-stats {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 8px;
}
.ej-progress-bar {
  flex: 1;
  height: 6px;
  background: var(--washi-line);
  border-radius: 4px;
  margin: 0 10px;
  overflow: hidden;
}
.ej-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--sakura));
  transition: width .3s ease;
  border-radius: 4px;
}

.ej-card-wrap {
  perspective: 1200px;
  height: 320px;
  margin-bottom: 16px;
}
.ej-card {
  position: relative;
  width: 100%;
  height: 100%;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.3,.7,.3,1);
}
.ej-card.flipped { transform: rotateY(180deg); }
.ej-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 16px;
  border: 1.5px solid var(--washi-line);
  background: #fffdf8;
  box-shadow: 0 6px 20px rgba(28,51,32,0.10);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
}
.ej-face.back { transform: rotateY(180deg); }
.ej-lesson-tag {
  position: absolute;
  top: 12px;
  left: 14px;
  font-size: 10.5px;
  font-weight: 700;
  color: var(--moss);
  border: 1px solid var(--moss);
  border-radius: 6px;
  padding: 2px 7px;
  letter-spacing: 0.03em;
}
.ej-verb-tag {
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 10.5px;
  color: var(--sakura);
  font-style: italic;
  border: 1px solid var(--sakura);
  border-radius: 6px;
  padding: 2px 7px;
}
.ej-kana {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 40px;
  font-weight: 700;
  color: var(--moss-deep);
  line-height: 1.2;
}
.ej-kanji {
  font-size: 15px;
  color: var(--ink-soft);
  margin-top: 6px;
}
.ej-romaji {
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 10px;
  letter-spacing: 0.02em;
}
.ej-meaning {
  font-family: 'Shippori Mincho', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--sakura);
  line-height: 1.3;
}
.ej-hint {
  font-size: 11px;
  color: var(--ink-soft);
  position: absolute;
  bottom: 12px;
  opacity: 0.75;
}
.ej-speak {
  position: absolute;
  bottom: 12px;
  right: 14px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1.5px solid var(--moss);
  background: #fff;
  color: var(--moss);
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform .12s ease, background .12s ease, color .12s ease;
}
.ej-speak:hover { transform: scale(1.07); }
.ej-speak:active { transform: scale(0.94); }
.ej-speak.playing {
  background: var(--moss);
  color: var(--washi);
}

.ej-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 6px;
}
.ej-btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-family: inherit;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: transform .12s ease, opacity .12s ease;
}
.ej-btn:active { transform: scale(0.97); }
.ej-btn-again {
  background: #fff;
  border: 1.5px solid var(--sakura);
  color: var(--sakura);
}
.ej-btn-know {
  background: var(--moss);
  color: var(--washi);
}
.ej-btn-shuffle {
  background: transparent;
  border: 1.5px solid var(--ink-soft);
  color: var(--ink-soft);
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
}
.ej-bottom-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}
.ej-done {
  text-align: center;
  padding: 50px 20px;
}
.ej-done .ej-kanji-big {
  font-family: 'Shippori Mincho', serif;
  font-size: 26px;
  color: var(--moss-deep);
  margin-bottom: 8px;
}
.ej-restart {
  margin-top: 16px;
  background: var(--sakura);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
</style>

(function(){
  let activeLessons = new Set(Array.from({length:14}, (_,i)=>i+1));
  let deck = [];
  let idx = 0;
  let flipped = false;
  let knownCount = 0;
  let sessionTotal = 0;
  let currentLessonShown = null;

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  let jpVoice = null;
  function loadVoices(){
    const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    jpVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('ja')) || null;
  }
  if('speechSynthesis' in window){
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }
  function speakJapanese(text, btn){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ja-JP';
    if(jpVoice) utter.voice = jpVoice;
    utter.rate = 0.8;
    if(btn){
      btn.classList.add('playing');
      utter.onend = () => btn.classList.remove('playing');
      utter.onerror = () => btn.classList.remove('playing');
    }
    window.speechSynthesis.speak(utter);
  }

  function buildDeck(){
    deck = shuffle(VOCAB.filter(v => activeLessons.has(v.l)));
    idx = 0;
    flipped = false;
    knownCount = 0;
    sessionTotal = deck.length;
  }

  function toggleLesson(n){
    if(activeLessons.has(n)){
      if(activeLessons.size > 1) activeLessons.delete(n);
    } else {
      activeLessons.add(n);
    }
    buildDeck();
    render();
  }

  function flipCard(){
    flipped = !flipped;
    render();
  }

  function nextCard(known){
    if(known) knownCount++;
    idx++;
    flipped = false;
    render();
  }

  function restart(){
    buildDeck();
    render();
  }

  function reshuffle(){
    deck = shuffle(deck.slice(idx));
    idx = 0;
    flipped = false;
    render();
  }

  function render(){
    const app = document.getElementById('ej-app');
    const remaining = deck.length - idx;
    const progressPct = sessionTotal ? Math.round((idx/sessionTotal)*100) : 0;

    let chipsHtml = Array.from({length:14}, (_,i)=>i+1).map(n => `
      <button class="ej-chip ${activeLessons.has(n) ? 'active':''}" data-lesson="${n}">L${n}</button>
    `).join('');

    if(idx >= deck.length && deck.length > 0){
      app.innerHTML = `
        <div class="ej-header">
          <div class="ej-title"><span class="jp">初級</span>Elementary Japanese</div>
          <div class="ej-sub">Listening Materials Vol. I</div>
        </div>
        <div class="ej-filters">${chipsHtml}</div>
        <div class="ej-done">
          <div class="ej-kanji-big">よくできました！</div>
          <div>You reviewed <strong>${sessionTotal}</strong> cards and knew <strong>${knownCount}</strong> of them.</div>
          <button class="ej-restart" id="ej-restart-btn">Study again</button>
        </div>
      `;
      document.getElementById('ej-restart-btn').onclick = restart;
      app.querySelectorAll('.ej-chip').forEach(btn=>{
        btn.onclick = () => toggleLesson(parseInt(btn.dataset.lesson));
      });
      return;
    }

    if(deck.length === 0){
      app.innerHTML = `
        <div class="ej-header">
          <div class="ej-title"><span class="jp">初級</span>Elementary Japanese</div>
        </div>
        <div class="ej-filters">${chipsHtml}</div>
        <div class="ej-done">Select at least one lesson to begin.</div>
      `;
      app.querySelectorAll('.ej-chip').forEach(btn=>{
        btn.onclick = () => toggleLesson(parseInt(btn.dataset.lesson));
      });
      return;
    }

    const card = deck[idx];
    const kanjiLine = card.kanji ? `<div class="ej-kanji">${card.kanji}</div>` : '';
    const verbTag = card.verb ? `<span class="ej-verb-tag">${card.verb}</span>` : '';

    app.innerHTML = `
      <div class="ej-header">
        <div class="ej-title"><span class="jp">初級</span>Elementary Japanese</div>
        <div class="ej-sub">Listening Materials Vol. I</div>
      </div>
      <div class="ej-filters">${chipsHtml}</div>
      <div class="ej-stats">
        <span>${idx+1} / ${sessionTotal}</span>
        <div class="ej-progress-bar"><div class="ej-progress-fill" style="width:${progressPct}%"></div></div>
        <span>${remaining} left</span>
      </div>
      <div class="ej-card-wrap">
        <div class="ej-card ${flipped ? 'flipped':''}" id="ej-card">
          <div class="ej-face front">
            <span class="ej-lesson-tag">L${card.l}</span>
            ${verbTag}
            <div class="ej-kana">${card.kana}</div>
            ${kanjiLine}
            <div class="ej-hint">tap to reveal meaning</div>
            <button class="ej-speak" data-speak="${card.kana.replace(/"/g,'&quot;')}" title="Play pronunciation">🔊</button>
          </div>
          <div class="ej-face back">
            <span class="ej-lesson-tag">L${card.l}</span>
            ${verbTag}
            <div class="ej-meaning">${card.en}</div>
            <div class="ej-romaji">${card.romaji}</div>
            <div class="ej-hint">tap to flip back</div>
            <button class="ej-speak" data-speak="${card.kana.replace(/"/g,'&quot;')}" title="Play pronunciation">🔊</button>
          </div>
        </div>
      </div>
      <div class="ej-actions">
        <button class="ej-btn ej-btn-again" id="ej-again">Still learning</button>
        <button class="ej-btn ej-btn-know" id="ej-know">I know it ✓</button>
      </div>
      <div class="ej-bottom-row">
        <span style="font-size:11px;color:var(--ink-soft)">${deck.length} cards in this set</span>
        <button class="ej-btn-shuffle" id="ej-shuffle">🔀 Shuffle remaining</button>
      </div>
    `;

    document.getElementById('ej-card').onclick = flipCard;
    document.getElementById('ej-again').onclick = (e) => { e.stopPropagation(); nextCard(false); };
    document.getElementById('ej-know').onclick = (e) => { e.stopPropagation(); nextCard(true); };
    document.getElementById('ej-shuffle').onclick = (e) => { e.stopPropagation(); reshuffle(); };
    app.querySelectorAll('.ej-speak').forEach(btn=>{
      btn.onclick = (e) => { e.stopPropagation(); speakJapanese(btn.dataset.speak, btn); };
    });
    app.querySelectorAll('.ej-chip').forEach(btn=>{
      btn.onclick = (e) => { e.stopPropagation(); toggleLesson(parseInt(btn.dataset.lesson)); };
    });
  }

  buildDeck();
  render();
})();
</script>

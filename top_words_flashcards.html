<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+JP:wght@400;500&display=swap');

html, body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f6f1e4;
}
.tw-root {
  --ai: #24406b;
  --ai-deep: #16294a;
  --washi: #f6f1e4;
  --washi-line: #e3d9c0;
  --hanko: #a83c34;
  --gold: #c79a3d;
  --ink: #2a2620;
  --ink-soft: #6b6455;
  font-family: 'Noto Sans JP', 'Zen Maru Gothic', sans-serif;
  color: var(--ink);
  background: var(--washi);
  background-image:
    radial-gradient(circle at 20% 10%, rgba(36,64,107,0.05), transparent 40%),
    radial-gradient(circle at 90% 85%, rgba(168,60,52,0.06), transparent 45%);
  border-radius: 18px;
  padding: 28px;
  width: 100%;
  max-width: 760px;
  margin: 24px auto;
  box-sizing: border-box;
  font-size: 1.12em;
}
.tw-root * { box-sizing: border-box; }

.tw-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
  border-bottom: 2px solid var(--washi-line);
  padding-bottom: 10px;
}
.tw-title {
  font-family: 'Shippori Mincho', serif;
  font-weight: 700;
  font-size: 21px;
  color: var(--ai-deep);
  letter-spacing: 0.02em;
}
.tw-title .jp { color: var(--hanko); margin-right: 8px; }
.tw-sub { font-size: 12px; color: var(--ink-soft); }

.tw-filters {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.tw-chip {
  border: 1.5px solid var(--ai);
  color: var(--ai);
  background: transparent;
  border-radius: 999px;
  padding: 4px 11px;
  font-size: 11.5px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s ease;
  font-family: inherit;
}
.tw-chip.active { background: var(--ai); color: var(--washi); }
.tw-chip:hover { transform: translateY(-1px); }
.tw-chip-all {
  border-color: var(--hanko); color: var(--hanko);
}
.tw-chip-all.active { background: var(--hanko); color: #fff; }

.tw-stats {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 8px;
}
.tw-progress-bar {
  flex: 1;
  height: 6px;
  background: var(--washi-line);
  border-radius: 4px;
  margin: 0 10px;
  overflow: hidden;
}
.tw-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--hanko));
  transition: width .3s ease;
  border-radius: 4px;
}

.tw-card-wrap {
  perspective: 1200px;
  height: 320px;
  margin-bottom: 16px;
}
.tw-card {
  position: relative;
  width: 100%;
  height: 100%;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.3,.7,.3,1);
}
.tw-card.flipped { transform: rotateY(180deg); }
.tw-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 16px;
  border: 1.5px solid var(--washi-line);
  background: #fffdf8;
  box-shadow: 0 6px 20px rgba(22,41,74,0.10);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
}
.tw-face.back { transform: rotateY(180deg); }
.tw-cat-tag {
  position: absolute;
  top: 12px;
  left: 14px;
  font-size: 10px;
  font-weight: 700;
  color: var(--ai);
  border: 1px solid var(--ai);
  border-radius: 6px;
  padding: 2px 7px;
  letter-spacing: 0.02em;
  text-transform: capitalize;
}
.tw-jp {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 38px;
  font-weight: 700;
  color: var(--ai-deep);
  line-height: 1.25;
  word-break: break-word;
}
.tw-reading {
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 10px;
  letter-spacing: 0.02em;
}
.tw-meaning {
  font-family: 'Shippori Mincho', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--hanko);
  line-height: 1.35;
}
.tw-hint {
  font-size: 11px;
  color: var(--ink-soft);
  position: absolute;
  bottom: 12px;
  opacity: 0.75;
}
.tw-speak {
  position: absolute;
  bottom: 12px;
  right: 14px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1.5px solid var(--ai);
  background: #fff;
  color: var(--ai);
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform .12s ease, background .12s ease, color .12s ease;
}
.tw-speak:hover { transform: scale(1.07); }
.tw-speak:active { transform: scale(0.94); }
.tw-speak.playing { background: var(--ai); color: var(--washi); }

.tw-actions { display: flex; gap: 10px; margin-bottom: 6px; }
.tw-btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-family: inherit;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: transform .12s ease, opacity .12s ease;
}
.tw-btn:active { transform: scale(0.97); }
.tw-btn-again { background: #fff; border: 1.5px solid var(--hanko); color: var(--hanko); }
.tw-btn-know { background: var(--ai); color: var(--washi); }
.tw-btn-shuffle {
  background: transparent;
  border: 1.5px solid var(--ink-soft);
  color: var(--ink-soft);
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
}
.tw-bottom-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}
.tw-done { text-align: center; padding: 44px 20px; }
.tw-done .tw-big { font-family: 'Shippori Mincho', serif; font-size: 24px; color: var(--ai-deep); margin-bottom: 8px; }
.tw-restart {
  margin-top: 16px;
  background: var(--hanko);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
</style>

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  let jpVoice = null;
  function loadVoices(){
    const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    jpVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('ja')) || null;
  }
  if('speechSynthesis' in window){
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }
  function speakJapanese(text, btn){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ja-JP';
    if(jpVoice) utter.voice = jpVoice;
    utter.rate = 0.8;
    if(btn){
      btn.classList.add('playing');
      utter.onend = () => btn.classList.remove('playing');
      utter.onerror = () => btn.classList.remove('playing');
    }
    window.speechSynthesis.speak(utter);
  }

  function buildDeck(){
    deck = shuffle(WORDS.filter(v => activeCats.has(v.cat)));
    idx = 0;
    flipped = false;
    knownCount = 0;
    sessionTotal = deck.length;
  }

  function toggleCat(c){
    if(c === '__all__'){
      activeCats = new Set(Object.keys(CAT_LABELS));
    } else {
      if(activeCats.has(c)){ if(activeCats.size>1) activeCats.delete(c); }
      else activeCats.add(c);
    }
    buildDeck();
    render();
  }

  function flipCard(){ flipped = !flipped; render(); }

  function nextCard(known){
    if(known) knownCount++;
    idx++;
    flipped = false;
    render();
  }

  function restart(){ buildDeck(); render(); }
  function reshuffle(){
    deck = shuffle(deck.slice(idx));
    idx = 0;
    flipped = false;
    render();
  }

  function render(){
    const app = document.getElementById('tw-app');
    const remaining = deck.length - idx;
    const progressPct = sessionTotal ? Math.round((idx/sessionTotal)*100) : 0;
    const allActive = activeCats.size === Object.keys(CAT_LABELS).length;

    let chipsHtml = `<button class="tw-chip tw-chip-all ${allActive ? 'active':''}" data-cat="__all__">All</button>` +
      Object.keys(CAT_LABELS).map(c => `
      <button class="tw-chip ${activeCats.has(c) ? 'active':''}" data-cat="${c}">${CAT_LABELS[c]}</button>
    `).join('');

    if(idx >= deck.length && deck.length > 0){
      app.innerHTML = `
        <div class="tw-header">
          <div class="tw-title"><span class="jp">単語</span>Top 1,070 Words</div>
        </div>
        <div class="tw-filters">${chipsHtml}</div>
        <div class="tw-done">
          <div class="tw-big">よくできました！</div>
          <div>You reviewed <strong>${sessionTotal}</strong> cards and knew <strong>${knownCount}</strong> of them.</div>
          <button class="tw-restart" id="tw-restart-btn">Study again</button>
        </div>
      `;
      document.getElementById('tw-restart-btn').onclick = restart;
      wireFilters();
      return;
    }

    if(deck.length === 0){
      app.innerHTML = `
        <div class="tw-header"><div class="tw-title"><span class="jp">単語</span>Top 1,070 Words</div></div>
        <div class="tw-filters">${chipsHtml}</div>
        <div class="tw-done">Select at least one category to begin.</div>
      `;
      wireFilters();
      return;
    }

    const card = deck[idx];

    app.innerHTML = `
      <div class="tw-header">
        <div class="tw-title"><span class="jp">単語</span>Top 1,070 Words</div>
        <div class="tw-sub">${sessionTotal} cards</div>
      </div>
      <div class="tw-filters">${chipsHtml}</div>
      <div class="tw-stats">
        <span>${idx+1} / ${sessionTotal}</span>
        <div class="tw-progress-bar"><div class="tw-progress-fill" style="width:${progressPct}%"></div></div>
        <span>${remaining} left</span>
      </div>
      <div class="tw-card-wrap">
        <div class="tw-card ${flipped ? 'flipped':''}" id="tw-card">
          <div class="tw-face front">
            <span class="tw-cat-tag">${CAT_LABELS[card.cat]}</span>
            <div class="tw-jp">${card.jp}</div>
            <div class="tw-reading">${card.reading}</div>
            <div class="tw-hint">tap to reveal meaning</div>
            <button class="tw-speak" data-speak="${card.jp.replace(/"/g,'&quot;')}" title="Play pronunciation">🔊</button>
          </div>
          <div class="tw-face back">
            <span class="tw-cat-tag">${CAT_LABELS[card.cat]}</span>
            <div class="tw-meaning">${card.en}</div>
            <div class="tw-reading">${card.reading}</div>
            <div class="tw-hint">tap to flip back</div>
            <button class="tw-speak" data-speak="${card.jp.replace(/"/g,'&quot;')}" title="Play pronunciation">🔊</button>
          </div>
        </div>
      </div>
      <div class="tw-actions">
        <button class="tw-btn tw-btn-again" id="tw-again">Still learning</button>
        <button class="tw-btn tw-btn-know" id="tw-know">I know it ✓</button>
      </div>
      <div class="tw-bottom-row">
        <span style="font-size:11px;color:var(--ink-soft)">${deck.length} cards in this set</span>
        <button class="tw-btn-shuffle" id="tw-shuffle">🔀 Shuffle remaining</button>
      </div>
    `;

    document.getElementById('tw-card').onclick = flipCard;
    document.getElementById('tw-again').onclick = (e) => { e.stopPropagation(); nextCard(false); };
    document.getElementById('tw-know').onclick = (e) => { e.stopPropagation(); nextCard(true); };
    document.getElementById('tw-shuffle').onclick = (e) => { e.stopPropagation(); reshuffle(); };
    app.querySelectorAll('.tw-speak').forEach(btn=>{
      btn.onclick = (e) => { e.stopPropagation(); speakJapanese(btn.dataset.speak, btn); };
    });
    wireFilters();
  }

  function wireFilters(){
    document.querySelectorAll('.tw-chip').forEach(btn=>{
      btn.onclick = (e) => { e.stopPropagation(); toggleCat(btn.dataset.cat); };
    });
  }

  buildDeck();
  render();
})();
</script>

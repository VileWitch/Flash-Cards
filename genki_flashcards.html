<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+JP:wght@400;500&display=swap');

html, body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f6f1e4;
}
.gk-root {
  --ai: #24406b;        /* indigo */
  --ai-deep: #16294a;
  --washi: #f6f1e4;      /* paper */
  --washi-line: #e3d9c0;
  --hanko: #a83c34;      /* seal red */
  --gold: #c79a3d;
  --ink: #2a2620;
  --ink-soft: #6b6455;
  font-family: 'Noto Sans JP', 'Zen Maru Gothic', sans-serif;
  color: var(--ink);
  background: var(--washi);
  background-image:
    radial-gradient(circle at 20% 10%, rgba(36,64,107,0.05), transparent 40%),
    radial-gradient(circle at 90% 85%, rgba(168,60,52,0.06), transparent 45%);
  border-radius: 18px;
  padding: 28px;
  width: 100%;
  max-width: 760px;
  margin: 24px auto;
  box-sizing: border-box;
  font-size: 1.12em;
}
.gk-root * { box-sizing: border-box; }

.gk-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
  border-bottom: 2px solid var(--washi-line);
  padding-bottom: 10px;
}
.gk-title {
  font-family: 'Shippori Mincho', serif;
  font-weight: 700;
  font-size: 22px;
  color: var(--ai-deep);
  letter-spacing: 0.02em;
}
.gk-title .jp { color: var(--hanko); margin-right: 8px; }
.gk-sub { font-size: 12px; color: var(--ink-soft); }

.gk-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.gk-chip {
  border: 1.5px solid var(--ai);
  color: var(--ai);
  background: transparent;
  border-radius: 999px;
  padding: 5px 13px;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s ease;
  font-family: inherit;
}
.gk-chip.active {
  background: var(--ai);
  color: var(--washi);
}
.gk-chip:hover { transform: translateY(-1px); }

.gk-stats {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 8px;
}
.gk-progress-bar {
  flex: 1;
  height: 6px;
  background: var(--washi-line);
  border-radius: 4px;
  margin: 0 10px;
  overflow: hidden;
}
.gk-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--hanko));
  transition: width .3s ease;
  border-radius: 4px;
}

.gk-card-wrap {
  perspective: 1200px;
  height: 320px;
  margin-bottom: 16px;
}
.gk-card {
  position: relative;
  width: 100%;
  height: 100%;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.3,.7,.3,1);
}
.gk-card.flipped { transform: rotateY(180deg); }
.gk-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 16px;
  border: 1.5px solid var(--washi-line);
  background: #fffdf8;
  box-shadow: 0 6px 20px rgba(22,41,74,0.10);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
}
.gk-face.back { transform: rotateY(180deg); }
.gk-lesson-tag {
  position: absolute;
  top: 12px;
  left: 14px;
  font-size: 10.5px;
  font-weight: 700;
  color: var(--ai);
  border: 1px solid var(--ai);
  border-radius: 6px;
  padding: 2px 7px;
  letter-spacing: 0.03em;
}
.gk-category-tag {
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 10.5px;
  color: var(--ink-soft);
  font-style: italic;
}
.gk-kana {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 42px;
  font-weight: 700;
  color: var(--ai-deep);
  line-height: 1.2;
}
.gk-kanji {
  font-size: 15px;
  color: var(--ink-soft);
  margin-top: 6px;
}
.gk-romaji {
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 10px;
  letter-spacing: 0.02em;
}
.gk-meaning {
  font-family: 'Shippori Mincho', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--hanko);
  line-height: 1.3;
}
.gk-hint {
  font-size: 11px;
  color: var(--ink-soft);
  position: absolute;
  bottom: 12px;
  opacity: 0.75;
}
.gk-speak {
  position: absolute;
  bottom: 12px;
  right: 14px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1.5px solid var(--ai);
  background: #fff;
  color: var(--ai);
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform .12s ease, background .12s ease, color .12s ease;
}
.gk-speak:hover { transform: scale(1.07); }
.gk-speak:active { transform: scale(0.94); }
.gk-speak.playing {
  background: var(--ai);
  color: var(--washi);
}

.gk-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 6px;
}
.gk-btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-family: inherit;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: transform .12s ease, opacity .12s ease;
}
.gk-btn:active { transform: scale(0.97); }
.gk-btn-again {
  background: #fff;
  border: 1.5px solid var(--hanko);
  color: var(--hanko);
}
.gk-btn-know {
  background: var(--ai);
  color: var(--washi);
}
.gk-btn-shuffle {
  background: transparent;
  border: 1.5px solid var(--ink-soft);
  color: var(--ink-soft);
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
}
.gk-bottom-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}
.gk-done {
  text-align: center;
  padding: 50px 20px;
}
.gk-done .gk-kanji-big {
  font-family: 'Shippori Mincho', serif;
  font-size: 26px;
  color: var(--ai-deep);
  margin-bottom: 8px;
}
.gk-restart {
  margin-top: 16px;
  background: var(--hanko);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
</style>

{l:3, cat:"Expressions", kana:"そうですね", kanji:"", romaji:"soo desu ne", en:"That's right.; Let me see."},
{l:3, cat:"Expressions", kana:"でも", kanji:"", romaji:"demo", en:"but"},
{l:3, cat:"Expressions", kana:"どうですか", kanji:"", romaji:"doo desu ka", en:"How about ...?; How is ...?"},
{l:3, cat:"Expressions", kana:"ええ", kanji:"", romaji:"ee", en:"yes"},
];

(function(){
  let activeLessons = new Set([1,2,3]);
  let deck = [];
  let idx = 0;
  let flipped = false;
  let knownCount = 0;
  let sessionTotal = 0;
  let direction = "jp"; // jp = show kana/kanji first, en = show meaning first

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  let jpVoice = null;
  function loadVoices(){
    const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    jpVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('ja')) || null;
  }
  if('speechSynthesis' in window){
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }
  function speakJapanese(text, btn){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ja-JP';
    if(jpVoice) utter.voice = jpVoice;
    utter.rate = 0.8;
    if(btn){
      btn.classList.add('playing');
      utter.onend = () => btn.classList.remove('playing');
      utter.onerror = () => btn.classList.remove('playing');
    }
    window.speechSynthesis.speak(utter);
  }

  function buildDeck(){
    deck = shuffle(VOCAB.filter(v => activeLessons.has(v.l)));
    idx = 0;
    flipped = false;
    knownCount = 0;
    sessionTotal = deck.length;
  }

  function toggleLesson(n){
    if(activeLessons.has(n)){
      if(activeLessons.size > 1) activeLessons.delete(n);
    } else {
      activeLessons.add(n);
    }
    buildDeck();
    render();
  }

  function flipCard(){
    flipped = !flipped;
    render();
  }

  function nextCard(known){
    if(known) knownCount++;
    idx++;
    flipped = false;
    render();
  }

  function restart(){
    buildDeck();
    render();
  }

  function reshuffle(){
    deck = shuffle(deck.slice(idx));
    idx = 0;
    flipped = false;
    render();
  }

  function render(){
    const app = document.getElementById('gk-app');
    const remaining = deck.length - idx;
    const progressPct = sessionTotal ? Math.round((idx/sessionTotal)*100) : 0;

    let chipsHtml = [1,2,3].map(n => `
      <button class="gk-chip ${activeLessons.has(n) ? 'active':''}" data-lesson="${n}">Lesson ${n}</button>
    `).join('');

    if(idx >= deck.length && deck.length > 0){
      app.innerHTML = `
        <div class="gk-header">
          <div class="gk-title"><span class="jp">単語</span>Genki I &middot; Vocab</div>
          <div class="gk-sub">Lessons 1&ndash;3</div>
        </div>
        <div class="gk-filters">${chipsHtml}</div>
        <div class="gk-done">
          <div class="gk-kanji-big">よくできました！</div>
          <div>You reviewed <strong>${sessionTotal}</strong> cards and knew <strong>${knownCount}</strong> of them.</div>
          <button class="gk-restart" id="gk-restart-btn">Study again</button>
        </div>
      `;
      document.getElementById('gk-restart-btn').onclick = restart;
      app.querySelectorAll('.gk-chip').forEach(btn=>{
        btn.onclick = () => toggleLesson(parseInt(btn.dataset.lesson));
      });
      return;
    }

    if(deck.length === 0){
      app.innerHTML = `
        <div class="gk-header">
          <div class="gk-title"><span class="jp">単語</span>Genki I &middot; Vocab</div>
        </div>
        <div class="gk-filters">${chipsHtml}</div>
        <div class="gk-done">Select at least one lesson to begin.</div>
      `;
      app.querySelectorAll('.gk-chip').forEach(btn=>{
        btn.onclick = () => toggleLesson(parseInt(btn.dataset.lesson));
      });
      return;
    }

    const card = deck[idx];
    const kanjiLine = card.kanji ? `<div class="gk-kanji">${card.kanji}</div>` : '';

    app.innerHTML = `
      <div class="gk-header">
        <div class="gk-title"><span class="jp">単語</span>Genki I &middot; Vocab</div>
        <div class="gk-sub">Lessons 1&ndash;3</div>
      </div>
      <div class="gk-filters">${chipsHtml}</div>
      <div class="gk-stats">
        <span>${idx+1} / ${sessionTotal}</span>
        <div class="gk-progress-bar"><div class="gk-progress-fill" style="width:${progressPct}%"></div></div>
        <span>${remaining} left</span>
      </div>
      <div class="gk-card-wrap">
        <div class="gk-card ${flipped ? 'flipped':''}" id="gk-card">
          <div class="gk-face front">
            <span class="gk-lesson-tag">L${card.l}</span>
            <span class="gk-category-tag">${card.cat}</span>
            <div class="gk-kana">${card.kana}</div>
            ${kanjiLine}
            <div class="gk-hint">tap to reveal meaning</div>
            <button class="gk-speak" data-speak="${card.kana.replace(/"/g,'&quot;')}" title="Play pronunciation">🔊</button>
          </div>
          <div class="gk-face back">
            <span class="gk-lesson-tag">L${card.l}</span>
            <span class="gk-category-tag">${card.cat}</span>
            <div class="gk-meaning">${card.en}</div>
            <div class="gk-romaji">${card.romaji}</div>
            <div class="gk-hint">tap to flip back</div>
            <button class="gk-speak" data-speak="${card.kana.replace(/"/g,'&quot;')}" title="Play pronunciation">🔊</button>
          </div>
        </div>
      </div>
      <div class="gk-actions">
        <button class="gk-btn gk-btn-again" id="gk-again">Still learning</button>
        <button class="gk-btn gk-btn-know" id="gk-know">I know it ✓</button>
      </div>
      <div class="gk-bottom-row">
        <span style="font-size:11px;color:var(--ink-soft)">${deck.length} cards in this set</span>
        <button class="gk-btn-shuffle" id="gk-shuffle">🔀 Shuffle remaining</button>
      </div>
    `;

    document.getElementById('gk-card').onclick = flipCard;
    document.getElementById('gk-again').onclick = (e) => { e.stopPropagation(); nextCard(false); };
    document.getElementById('gk-know').onclick = (e) => { e.stopPropagation(); nextCard(true); };
    document.getElementById('gk-shuffle').onclick = (e) => { e.stopPropagation(); reshuffle(); };
    app.querySelectorAll('.gk-speak').forEach(btn=>{
      btn.onclick = (e) => { e.stopPropagation(); speakJapanese(btn.dataset.speak, btn); };
    });
    app.querySelectorAll('.gk-chip').forEach(btn=>{
      btn.onclick = (e) => { e.stopPropagation(); toggleLesson(parseInt(btn.dataset.lesson)); };
    });
  }

  buildDeck();
  render();
})();
</script>
